<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Quiz Clash - ホスト</title>
<link rel="stylesheet" href="/css/style.css" />
</head>
<body class="host-body">

  <!-- ===== 画面1: クイズ編集 ===== -->
  <section id="screen-editor" class="screen">
    <div class="editor-wrap">
      <h1 class="page-title">クイズを作成</h1>

      <label class="field-label">クイズのタイトル</label>
      <input id="quiz-title" type="text" placeholder="例: 一般常識クイズ" maxlength="100" />

      <div id="questions-list"></div>

      <div class="editor-actions">
        <button id="btn-add-question" class="btn btn-secondary" type="button">+ 問題を追加</button>
        <button id="btn-load-sample" class="btn btn-secondary" type="button">サンプルを読み込む</button>
      </div>
      <div class="editor-actions">
        <button id="btn-save-quiz" class="btn btn-secondary" type="button">クイズを保存</button>
        <button id="btn-load-quiz" class="btn btn-secondary" type="button">クイズを読み込む</button>
        <input id="file-load-quiz" type="file" accept="application/json,.json" class="hidden" />
      </div>

      <p id="editor-error" class="error-text"></p>

      <button id="btn-create-room" class="btn btn-primary btn-large" type="button">ゲームを作成する</button>
    </div>
  </section>

  <!-- ===== 画面2: ロビー（参加待ち） ===== -->
  <section id="screen-lobby" class="screen hidden">
    <div class="lobby-wrap">
      <p class="lobby-label">参加コード</p>
      <h1 id="room-code" class="room-code">------</h1>

      <div id="qr-wrap" class="qr-wrap"></div>
      <p class="join-url-box"><a id="join-url-link" class="join-url-link" href="#" target="_blank" rel="noopener"></a></p>
      <p class="lobby-hint">スマホのカメラでQRコードを読み取るか、上のURLを開いて参加してください</p>

      <h2 class="players-title">参加者 (<span id="player-count">0</span>人)</h2>
      <div id="players-grid" class="players-grid"></div>

      <button id="btn-start-game" class="btn btn-primary btn-large" type="button" disabled>クイズを開始する</button>
    </div>
  </section>

  <!-- ===== 画面3: 出題中 ===== -->
  <section id="screen-question" class="screen hidden">
    <div class="question-top">
      <span id="q-progress" class="q-progress">問題 1 / 5</span>
      <div class="timer-bar-track"><div id="timer-bar" class="timer-bar-fill"></div></div>
      <span id="q-answered" class="q-answered">回答: 0 / 0</span>
    </div>
    <h1 id="q-text" class="q-text">問題文がここに表示されます</h1>
    <div id="q-options" class="options-grid"></div>
    <button id="btn-show-results" class="btn btn-primary btn-large" type="button">結果を見る</button>
  </section>

  <!-- ===== 画面4: 結果・リーダーボード ===== -->
  <section id="screen-results" class="screen hidden">
    <h1 class="page-title">正解は…</h1>
    <p id="results-correct-text" class="results-correct-text"></p>
    <div id="results-bars" class="results-bars"></div>

    <h2 class="leaderboard-title">リーダーボード</h2>
    <div id="leaderboard-list" class="leaderboard-list"></div>

    <button id="btn-next-step" class="btn btn-primary btn-large" type="button">次の問題へ</button>
  </section>

  <!-- ===== 画面5: ゲーム終了 ===== -->
  <section id="screen-gameover" class="screen hidden">
    <h1 class="page-title">最終結果 🎉</h1>
    <div id="podium" class="podium"></div>
    <div id="final-leaderboard-list" class="leaderboard-list"></div>
    <a href="/host.html" class="btn btn-primary btn-large">もう一度作成する</a>
  </section>

  <script src="/js/qrcode.min.js"></script>
  <script src="/socket.io/socket.io.js"></script>
  <script src="/js/host.js"></script>
</body>
</html>
